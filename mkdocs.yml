site_name: FastObjects
site_description: The fastest 2D object rendering library for Python
site_url: https://enzo-azevedo.github.io/FastObjects/
repo_url: https://github.com/Enzo-Azevedo/FastObjects
repo_name: Enzo-Azevedo/FastObjects
docs_dir: docs/site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      toggle:
        icon: material/weather-sunny
        name: Light mode

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português
          build: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
      - Sprites & Groups: guide/sprites.md
      - Shapes: guide/shapes.md
      - Window & Input: guide/window-input.md
      - Using inside pygame: guide/interop.md
  - Performance: performance.md
  - API Reference: api.md
